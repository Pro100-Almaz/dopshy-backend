services:
  db:
    image: postgres:latest
    container_name: db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/
    volumes:
      - postgresql_db_data:/var/lib/postgresql/data/
    expose:
      - 5432
    ports:
      - 5433:5432

  db_editor:
    image: adminer
    container_name: db_editor
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
    expose:
      - 8080
    ports:
      - 8081:8080
    depends_on:
      - db

  backend_app:
    container_name: backend_app
    restart: always
    build:
      dockerfile: Dockerfile
      context: ./backend/
    env_file:
      - .env
    volumes:
      - ./backend/:/usr/backend/
    expose:
      - 8000
    # Bind to localhost only — public traffic is fronted by the bot project's
    # edge nginx (https://api.dopsy.kz), which reaches this over `shared`.
    # This mapping is just for local debugging on the host.
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - default
      - shared
    depends_on:
      - db

  # NOTE: TLS termination + public routing now live in the bot compose project's
  # edge nginx (it owns host ports 80/443 and routes api.dopsy.kz → backend_app:8000
  # over the shared network). This project intentionally no longer runs nginx/certbot.

volumes:
  postgresql_db_data:

networks:
  default:
  # Shared with the bot's compose project so the backend can reach the bot
  # by service name (http://bot:5000). Create once: `docker network create dopshy_shared`.
  shared:
    external: true
    name: dopshy_shared
