# Replace YOURDOMAIN.COM with your actual domain before deploying.
# SSL certificates are managed by certbot (see docker-compose.yaml).
# Run ./init-ssl.sh <domain> <email> to obtain the initial certificate.

# HTTP — ACME challenge passthrough + redirect everything else to HTTPS
server {
    listen 80;
    server_name YOURDOMAIN.COM;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — terminate SSL and proxy to FastAPI backend
server {
    listen 443 ssl;
    server_name YOURDOMAIN.COM;

    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # Proxy to FastAPI
    location / {
        proxy_pass         http://backend_app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Increase body size limit for file uploads if needed
    client_max_body_size 10M;
}
