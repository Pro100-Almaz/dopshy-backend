# Placeholder — HTTP only.
# Run ./init-ssl.sh <domain> <email> to obtain a certificate and replace this file.

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 503 "SSL not configured. Run: ./init-ssl.sh <domain> <email>";
        add_header Content-Type text/plain always;
    }
}
