# TEMPORARY — HTTP only, used to obtain the first SSL certificate via certbot.
# After certbot succeeds, replace this file with nginx.ssl.conf and reload nginx.

server {
    listen 80;
    server_name api.dopsy.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 503 "SSL certificate is being provisioned. Please try again shortly.";
        add_header Content-Type text/plain always;
    }
}
