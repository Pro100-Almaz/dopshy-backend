# Full config — activate this after certbot has issued the certificate.
# cp nginx/nginx.ssl.conf nginx/nginx.conf && docker compose exec nginx nginx -s reload

server {
    listen 80;
    server_name api.dopsy.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.dopsy.kz;

    ssl_certificate     /etc/letsencrypt/live/api.dopsy.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dopsy.kz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    location / {
        proxy_pass         http://backend_app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    client_max_body_size 10M;
}
